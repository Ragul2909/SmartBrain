<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Brain - Notes</title>
<link rel="stylesheet" href="style.css">

<style>

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:20px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:15px;
font-size:16px;
border-radius:8px;
}

select,input{
padding:10px;
font-size:16px;
}

button{
padding:10px 18px;
cursor:pointer;
}

.notes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.note-card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.note-card h3{
margin:0;
}

.note-card p{
white-space:pre-wrap;
}

.actions button{
margin:5px;
}

.pin{
color:gold;
font-size:20px;
}

</style>

</head>

<body>

<nav>

<h2>Smart Brain</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="notes.html">Notes</a></li>
<li><a href="tasks.html">Tasks</a></li>
<li><a href="ai.html">AI Assistant</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
</ul>

</nav>

<div class="container">

<h1>My Smart Notes</h1>

<textarea id="note" placeholder="Write your note..."></textarea>

<div class="controls">

<select id="category">
<option>Study</option>
<option>Work</option>
<option>Personal</option>
<option>Ideas</option>
</select>

<button onclick="saveNote()">Save Note</button>

<input type="text" id="search" placeholder="Search Notes..." onkeyup="displayNotes()">

</div>

<h3>Total Notes :
<span id="count">0</span>
</h3>

<div class="notes" id="notesList"></div>

</div>

<script>

let notes=JSON.parse(localStorage.getItem("notes"))||[];

function saveStorage(){
localStorage.setItem("notes",JSON.stringify(notes));
}

function saveNote(){

let text=document.getElementById("note").value;

let category=document.getElementById("category").value;

if(text==""){
alert("Please write a note.");
return;
}

let date=new Date().toLocaleString();

notes.push({

text:text,
category:category,
date:date,
pin:false

});

saveStorage();

document.getElementById("note").value="";

displayNotes();

}

function displayNotes(){

let search=document.getElementById("search").value.toLowerCase();

let html="";

notes.sort((a,b)=>b.pin-a.pin);

notes.forEach((note,index)=>{

if(note.text.toLowerCase().includes(search)){

html+=`

<div class="note-card">

<h3>${note.pin?"📌":""} ${note.category}</h3>

<p>${note.text}</p>

<small>${note.date}</small>

<div class="actions">

<button onclick="pinNote(${index})">
${note.pin?"Unpin":"Pin"}
</button>

<button onclick="editNote(${index})">
Edit
</button>

<button onclick="deleteNote(${index})">
Delete
</button>

</div>

</div>

`;

}

});

document.getElementById("notesList").innerHTML=html;

document.getElementById("count").innerHTML=notes.length;

}

function deleteNote(index){

if(confirm("Delete this note?")){

notes.splice(index,1);

saveStorage();

displayNotes();

}

}

function editNote(index){

let newText=prompt("Edit Note",notes[index].text);

if(newText!=null && newText!=""){

notes[index].text=newText;

saveStorage();

displayNotes();

}

}

function pinNote(index){

notes[index].pin=!notes[index].pin;

saveStorage();

displayNotes();

}

displayNotes();

</script>

</body>
</html>
