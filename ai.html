<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Brain AI</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}

nav{
background:#0077ff;
color:white;
padding:15px;
text-align:center;
}

.container{
width:80%;
max-width:800px;
margin:20px auto;
}

#chat{
height:400px;
background:white;
border:1px solid #ccc;
overflow-y:auto;
padding:10px;
border-radius:10px;
}

.user{
text-align:right;
color:blue;
margin:10px;
}

.ai{
text-align:left;
color:green;
margin:10px;
}

input{
width:75%;
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
cursor:pointer;
margin-left:5px;
}

</style>

</head>

<body>

<nav>
<h2>🤖 Smart Brain AI Assistant</h2>
</nav>

<div class="container">

<div id="chat"></div>

<br>

<input type="text" id="question" placeholder="Ask a question...">

<button onclick="askAI()">Send</button>

<button onclick="clearChat()">Clear</button>

</div>

<script>

function askAI(){

let input=document.getElementById("question");

let q=input.value.trim();

if(q=="") return;

let chat=document.getElementById("chat");

chat.innerHTML+="<div class='user'><b>You:</b> "+q+"</div>";

let ans="";

q=q.toLowerCase();

if(q.includes("hello") || q.includes("hi"))
ans="Hello! How can I help you?";

else if(q.includes("java"))
ans="Java is an object-oriented programming language.";

else if(q.includes("html"))
ans="HTML is used to create web pages.";

else if(q.includes("css"))
ans="CSS is used to style web pages.";

else if(q.includes("javascript"))
ans="JavaScript makes websites interactive.";

else if(q.includes("python"))
ans="Python is popular for AI, automation, and web development.";

else if(q.includes("sql"))
ans="SQL is used to manage databases.";

else if(q.includes("dbms"))
ans="DBMS stands for Database Management System.";

else if(q.includes("bye"))
ans="Goodbye! Have a great day.";

else
ans="Sorry, I don't know the answer yet.";

chat.innerHTML+="<div class='ai'><b>AI:</b> "+ans+"</div>";

chat.scrollTop=chat.scrollHeight;

input.value="";

}

function clearChat(){

document.getElementById("chat").innerHTML="";

}

document.getElementById("question").addEventListener("keypress",function(e){

if(e.key==="Enter")
askAI();

});

</script>

</body>
</html>
